name: Docker Image CI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag'
        required: true
        default: 'manual'

permissions:
  contents: read
  packages: write

jobs:
  # ==========================================
  # Stage 1: Build per architecture
  # ==========================================
  build:
    name: Build on ${{ matrix.platform.arch }}
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-latest
            arch: amd64
          # GitHub native ARM Runner
          - runner: ubuntu-24.04-arm
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.8.0

      - name: Prepare variables
        run: |
          echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "IMAGE_TAG=${{ github.event.release.tag_name }}" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=${{ github.event.inputs.tag }}" >> $GITHUB_ENV
          fi

      - name: Login to GHCR
        uses: docker/login-action@v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by architecture
        uses: docker/build-push-action@v6.10.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/${{ matrix.platform.arch }}
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/windsurfpoolapi:${{ env.IMAGE_TAG }}-${{ matrix.platform.arch }}
          cache-from: type=gha,scope=build-${{ matrix.platform.arch }}
          cache-to: type=gha,mode=max,scope=build-${{ matrix.platform.arch }}

  # ==========================================
  # Stage 2: Merge multi-arch manifests
  # ==========================================
  merge:
    name: Merge Multi-Arch Manifests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.8.0

      - name: Prepare variables
        run: |
          echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "IMAGE_TAG=${{ github.event.release.tag_name }}" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=${{ github.event.inputs.tag }}" >> $GITHUB_ENV
          fi

      - name: Login to GHCR
        uses: docker/login-action@v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest and push
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${{ env.OWNER_LC }}/windsurfpoolapi:${{ env.IMAGE_TAG }} \
            -t ghcr.io/${{ env.OWNER_LC }}/windsurfpoolapi:latest \
            ghcr.io/${{ env.OWNER_LC }}/windsurfpoolapi:${{ env.IMAGE_TAG }}-amd64 \
            ghcr.io/${{ env.OWNER_LC }}/windsurfpoolapi:${{ env.IMAGE_TAG }}-arm64
