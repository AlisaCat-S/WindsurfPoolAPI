services:
  windsurfapi:
    # build: .
    image: ghcr.io/alisacat-s/windsurfpoolapi:latest
    container_name: windsurfapi
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      LS_PORT: 42100
      DEFAULT_MODEL: gpt-4o-mini
      MAX_TOKENS: 8192
      LOG_LEVEL: info
      DASHBOARD_PASSWORD: ""
      API_KEY: ""
    volumes:
      # Runtime state files
      - ./accounts.json:/app/accounts.json
      - ./stats.json:/app/stats.json
      - ./runtime-config.json:/app/runtime-config.json
      - ./proxy-config.json:/app/proxy-config.json
      - ./model-access.json:/app/model-access.json
      - ./logs:/app/logs
      # Language Server binary (run ./download-ls.sh first)
      - ./windsurf:/opt/windsurf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3003/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
